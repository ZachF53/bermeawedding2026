{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — B&amp;A</title>
  <link rel="icon" type="image/png" href="{% static 'wedding/images/bouquet-img.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lora:400|Dancing+Script:700&display=fallback">
  <link rel="stylesheet" href="{% static 'wedding/css/dashboard.css' %}">
</head>
<body class="dashboard login-page">
  <div class="login-card">
    <h1>Brian &amp; Aisha</h1>
    <p class="login-subtitle">Admin Login</p>
    {% if error %}<div class="msg msg-error">{{ error }}</div>{% endif %}
    <form method="post" action="">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-gold" style="width:100%; padding:12px 20px; font-size:0.95rem;">Log In</button>
    </form>
  </div>
</body>
</html>
